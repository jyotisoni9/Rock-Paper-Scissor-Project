 <!DOCTYPE html>
 <html>
<head>
 <title>Rock-ppr-scr</title>
</head>
<body>
  <p>
    Rock Paper Scissors
  </p>

  <button onclick="
   playGame('rock');
  ">
    Rock
  </button>

  <button  onclick="
   playGame('paper');
   ">
    paper
  </button>

  <button onclick="
   playGame('scissor');
   ">
    scissor
  </button>
   
  <p class="js-result"></p>
  <p class="js-moves"></p>
  <p class="js-score"></p>

  <button onclick="
  score.wins=0;
  score.losss=0;
  score.ties=0;
  localStorage.removeItem('score');
  updateScoreElement();
  ">
    Reset Score
  </button>
  
  <script>
    let score =JSON.parse(localStorage.getItem('score')) ||{
      wins:0,
      losses:0,
      ties:0
    };
    /*if(score === null){
      score = {
        wins :0,
        losses: 0,
        ties:0
      };
    }
      */
      
      updateScoreElement();
     
    function playGame(playerMove){
      computerMove = pickComputerMove();
        console.log(computerMove);

        let result = '';
        if (playerMove === 'scissor'){
          if (computerMove === 'rock'){
            result = 'You Lose!';
        }else if(computerMove ==='paper'){
            result = 'You Won.';
        }else{
          result = 'Tie';
        }

        }else if (playerMove === 'paper'){
          if (computerMove === 'rock'){
           result = 'You Won.';
          }else if(computerMove ==='paper'){
          result = 'Tie';
          }else{
           result = 'You Lose!';
          }
          
        }else{
          if (computerMove === 'rock'){
          result = 'Tie';
          }else if(computerMove ==='paper'){
         result = 'You Lose!';
          }else{
          result = 'You Won.';
          }
        }
          
           if (result === 'You Won.') {
            score.wins +=1;
           }else if (result === 'You Lose!'){
            score.losses +=1;
           }else if(result === 'Tie' ){
            score.ties +=1;
           }
            
           localStorage.setItem('score',JSON.stringify(score)); // we use JSON.strigify here bcoz score is an obj and we have to chnge it to string

            updateScoreElement();

            document.querySelector('.js-result').innerHTML = result;

            document.querySelector('.js-moves').innerHTML = `You pick ${playerMove}- Computer pick ${computerMove} `;

         
    }


   let computerMove = ' ';

     function updateScoreElement(){
       document.querySelector('.js-score').innerHTML=` Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
     }

    function pickComputerMove(){
      const randomNumber = Math.random();

      let computerMove = ' ';

      if(randomNumber >= 0 && randomNumber < 1/3){
        computerMove = 'rock';
      }else if(randomNumber >= 1/3 && randomNumber < 2/3){
        computerMove = 'paper';
      }else if(randomNumber >= 2/3 && randomNumber < 1){
        computerMove = 'scissor';
      }
      return computerMove;
    }
  </script>
</body>
</html>
