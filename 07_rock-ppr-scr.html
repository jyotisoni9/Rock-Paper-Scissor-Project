 <!DOCTYPE html>
 <html>
<head>
 <title>Rock-ppr-scr</title>
</head>
<body>
  <p>
    Rock Paper Scissors
  </p>

  <button onclick="
   playGame('rock');
  ">
    Rock
  </button>

  <button  onclick="
   playGame('paper');
   ">
    paper
  </button>

  <button onclick="
   playGame('scissor');
   ">
    scissor
  </button>
  
  <script>
    function playGame(playerMove){
      computerMove = pickComputerMove();
        console.log(computerMove);

        let result = '';
        if (playerMove === 'scissor'){
          if (computerMove === 'rock'){
            result = 'You lose.';
        }else if(computerMove ==='paper'){
            result = 'You win.';
        }else{
          result = 'Tie';
        }

        }else if (playerMove === 'paper'){
          if (computerMove === 'rock'){
           result = 'You Won.';
          }else if(computerMove ==='paper'){
          result = 'Tie';
          }else{
           result = 'You lose';
          }
          
        }else{
          if (computerMove === 'rock'){
          result = 'Tie.';
          }else if(computerMove ==='paper'){
         result = 'You Lose!';
          }else{
          result = 'You Won';
          }
        }
        
         alert(` You picked ${playerMove} . Computer picked ${computerMove}. ${result}`);
    }


   let computerMove = ' ';

    function pickComputerMove(){
      const randomNumber = Math.random();

      let computerMove = ' ';

      if(randomNumber >= 0 && randomNumber < 1/3){
        computerMove = 'rock';
      }else if(randomNumber >= 1/3 && randomNumber < 2/3){
        computerMove = 'paper';
      }else if(randomNumber >= 2/3 && randomNumber < 1){
        computerMove = 'scissor';
      }
      return computerMove;
    }
  </script>
</body>
</html>
