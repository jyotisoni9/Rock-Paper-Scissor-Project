 <!DOCTYPE html>
 <html>

<head>
 <title>Rock-ppr-scr</title>
 <link rel="stylesheet" href="styles/12_rock_ppr_szr .css">
</head>

<body>
  <p class="title">
    Rock Paper Scissors
  </p>
    
 
  <button 
    class="move-button js-rock-button">  
   <img src="images/rock-emoji.png" class="move-icon">
  </button> 

  <button  onclick="
   playGame('paper');
   "  class="move-button">
    <img src="images/paper-emoji.png" class="move-icon">
  </button>

  <button onclick="
   playGame('scissor');
   "  class="move-button">
   <img src="images/scissor-emoji.png" class="move-icon">
  </button>
   
  <p class="js-result result" ></p>
  <p class="js-moves"></p>
  <p class="js-score score"></p>

  <button onclick="
  score.wins=0;
  score.losses=0;
  score.ties=0;
  localStorage.removeItem('score');
  updateScoreElement();
  " class="reset-button">
    Reset Score
  </button>

  <button class="auto-play-button " onclick="autoplay();">
    Auto Play
  </button>
  
  <script src="scripts/12_rock_ppr_szr.js"></script>
   
</body>

</html>
